# Pipeline Configuration
problem_statement: |
  Predict and classify natural disasters (wildfires, floods, droughts) and their
  impact on crops using global satellite telemetry data from NASA FIRMS, EONET,
  and POWER APIs, combined with historical disaster training data from Kaggle.
  Focus on identifying high-risk zones for emergency dispatch and agricultural protection.

domain_context: |
  Global Environmental Resilience & Crop Protection Command Center.
  Live data from NASA FIRMS VIIRS_SNPP_NRT satellite (375m resolution),
  NASA EONET (natural event tracker), and NASA POWER (weather/climate).
  Historical training data from Kaggle (flood, drought, wildfire, crop impact).
  Covers 20+ global regions: India, Sub-Saharan Africa, Brazil, SE Asia,
  Mediterranean Europe, Central America, Middle East, Australia, North America.
  Target column is "confidence" (fire detection confidence: 'l', 'n', 'h').

target_column: "confidence"
task_type: "classification"

sources:
  - source_type: "nasa_api"
    map_key: "VIIRS_SNPP_NRT"
    area_coords: "world"

kaggle_data_dir: "data/kaggle"

llm:
  provider: "auto"
  model: ""
  temperature: 0.1
  max_tokens: 4096

human_checkpoints: []

quality_gates_path: "config/quality_gates.yaml"
output_dir: "output"
